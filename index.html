<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cadastro - Sonic Apostas</title>

<style>
body {
  background: #0b0283;
  color: white;
  font-family: Arial;
  display: flex;
  justify-content: center;
  padding: 20px;
}

.container {
  background: #1a1a1a;
  padding: 25px;
  border-radius: 10px;
  width: 400px;
}

h2 {
  text-align: center;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border: none;
  border-radius: 5px;
  background: #2a2a2a;
  color: white;
}

button {
  width: 100%;
  padding: 10px;
  background: red;
  border: none;
  border-radius: 5px;
  color: white;
  cursor: pointer;
}

button:hover {
  background: darkred;
}

/* LOADING SONIC */
#loading {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #0a1aff;
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

.loader-content {
  text-align: center;
}

.loader-content img {
  width: 120px;
}

.loader-content p {
  margin-top: 10px;
  font-size: 18px;
  color: white;
}
</style>
</head>

<body>

<div class="container">
<h2>Cadastro - Sonic Apostas</h2>

<form id="form">

<h3>🧾 Dados</h3>
<input type="text" placeholder="Nome do ADM" required>
<input type="text" placeholder="Nome completo" required>
<input type="number" placeholder="Idade" required>

<h3>☎ Contatos</h3>
<input type="text" placeholder="Número principal" required>
<input type="text" placeholder="Discord" required>

<h3>🎮 Jogo</h3>
<input type="text" placeholder="Nick no Free Fire" required>
<input type="text" placeholder="ID do jogo" required>
<input type="text" placeholder="Função (Rush, Suporte...)" required>

<textarea placeholder="Experiência"></textarea>

<h3>📌 Confirmação</h3>
<label>
  <input type="checkbox" required>
  Confirmo que concordo com as regras da organização.
</label>

<button type="submit">Enviar</button>

</form>
</div>

<!-- LOADING -->
<div id="loading">
  <div class="loader-content">
    <img src="https://media.giphy.com/media/LMt9638dO8dftAjtco/giphy.gif">
    <p>Enviando...</p>
  </div>
</div>

<script>
document.getElementById("form").addEventListener("submit", async function(e){
  e.preventDefault();

  const loading = document.getElementById("loading");
  loading.style.display = "flex";

  const inputs = document.querySelectorAll("input, textarea");

  let dados = "📩 NOVO CADASTRO - SONIC APOSTAS\n\n";

  inputs.forEach((input) => {
    if(input.type !== "checkbox"){
      dados += `${input.placeholder}: ${input.value}\n`;
    }
  });

  try {
    await fetch("https://discord.com/api/webhooks/1492687038762188810/zwJV6yCuDDkdJqyaRHGCcu_sMikz3dDZrLchrXcDu1IWHJOgbrBbX9ksPMmiwDFb-qv0", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        content: dados
      })
    });

    loading.style.display = "none";
    alert("Enviado com sucesso 🔥");
    this.reset();

  } catch (erro) {
    loading.style.display = "none";
    alert("Erro ao enviar 😢");
  }
});
</script>

</body>
</html>
